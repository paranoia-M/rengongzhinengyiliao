name: Build AI Data Analysis Platform

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 添加了 pyqtgraph 以及可能用到的 Web 引擎组件
        pip install PySide6 pyqtgraph numpy scipy pandas pyinstaller cryptography opencv-python matplotlib

    - name: Build EXE with PyInstaller
      run: |
        # 显式包含 pyqtgraph 和核心 GUI 模块
        pyinstaller --noconsole --onefile `
        --hidden-import "pyqtgraph" `
        --hidden-import "PySide6.QtCore" `
        --hidden-import "PySide6.QtGui" `
        --hidden-import "PySide6.QtWidgets" `
        --hidden-import "PySide6.QtWebEngineWidgets" `
        --name "AI_Platform_v1.5.1" `
        main.py

    - name: Upload Executable Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AI-Platform-EXE
        path: dist/AI_Platform_v1.5.1.exe
        retention-days: 5