name: Build AI Data Analysis Platform

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 核心修正：安装 PySide6 以及 AI 影像处理常用的库
        pip install PySide6 numpy scipy pandas pyinstaller cryptography opencv-python matplotlib

    - name: Build EXE with PyInstaller
      run: |
        # 使用 pyinstaller 打包
        # --hidden-import 确保 PySide6 的核心组件被强制包含
        pyinstaller --noconsole --onefile `
        --hidden-import "PySide6" `
        --hidden-import "PySide6.QtCore" `
        --hidden-import "PySide6.QtGui" `
        --hidden-import "PySide6.QtWidgets" `
        --name "AI_Data_Analysis_Platform_v1.5" `
        main.py

    - name: Upload Executable Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AI-Platform-EXE
        path: dist/AI_Data_Analysis_Platform_v1.5.exe
        retention-days: 5