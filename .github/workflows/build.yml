name: Build AI Data Analysis Platform

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PySide6 pyqtgraph numpy scipy pandas pyinstaller cryptography opencv-python matplotlib

    - name: Build EXE with PyInstaller
      run: |
        # 加入 --uac-admin 强制程序申请管理员权限
        pyinstaller --noconsole --onefile --uac-admin `
        --hidden-import "pyqtgraph" `
        --hidden-import "PySide6.QtCore" `
        --hidden-import "PySide6.QtGui" `
        --hidden-import "PySide6.QtWidgets" `
        --name "AI_Platform_Final" `
        main.py

    - name: Upload Executable Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AI-Platform-Final-EXE
        path: dist/AI_Platform_Final.exe
        retention-days: 5