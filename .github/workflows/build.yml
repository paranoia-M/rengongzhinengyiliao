name: Build AI Data Analysis Platform

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 确保安装所有必要库
        pip install PySide6 pyqtgraph numpy scipy pandas pyinstaller opencv-python matplotlib

    - name: Build EXE with PyInstaller
      run: |
        # 使用 --collect-all 这是目前解决 PySide6 找不到模块最彻底的方法
        # 它会强制把 PySide6 和 pyqtgraph 的所有相关文件全部塞进 EXE
        pyinstaller --noconsole --onefile --uac-admin `
        --collect-all "PySide6" `
        --collect-all "pyqtgraph" `
        --name "AI_Platform_Pro_Edition" `
        main.py

    - name: Upload Executable Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AI-Platform-Pro-EXE
        path: dist/AI_Platform_Pro_Edition.exe
        retention-days: 5