name: Build IR Simulation Win-Standalone

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 必须安装的科学计算与界面库
        pip install numpy scipy pandas PyQt6 pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        # 核心逻辑：
        # 1. --onefile: 只有一个 EXE，方便在 Windows 发给别人直接运行
        # 2. --noconsole: 运行时不显示 CMD 黑色窗口
        # 3. --collect-all: 这是重点！确保 scipy 的物理常数和算法能打包进 Win 环境
        # 4. --clean: 每次构建前清理缓存，防止旧文件干扰
        pyinstaller --noconsole --onefile --clean `
        --collect-all scipy `
        --collect-submodules core `
        --collect-submodules environment `
        --collect-submodules sensor `
        --hidden-import "core.physics_constants" `
        --hidden-import "core.thermal_dynamics" `
        --hidden-import "core.material_database" `
        --hidden-import "environment.celestial_mechanics" `
        --hidden-import "environment.atmospheric_model" `
        --hidden-import "environment.terrain_engine" `
        --hidden-import "environment.ocean_physics" `
        --hidden-import "sensor.ir_camera_model" `
        --hidden-import "sensor.post_processing" `
        --name "IR_Simulation_System_Windows" `
        main.py

    - name: Upload Executable Artifact
      uses: actions/upload-artifact@v4
      with:
        name: IR-Simulation-System-Windows
        path: dist/IR_Simulation_System_Windows.exe
        retention-days: 5